version: "3.9"

services:
  db:
    image: postgres:16
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: mergegate
      POSTGRES_PASSWORD: mergegate
      POSTGRES_DB: mergegate
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mergegate -d mergegate"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s

  db-test:
    image: postgres:16
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: mergegate
      POSTGRES_PASSWORD: mergegate
      POSTGRES_DB: mergegate_test
    tmpfs:
      - /var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mergegate -d mergegate_test"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  postgres_data:
