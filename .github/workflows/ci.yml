name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install uv
        run: pip install uv
      - name: Install dependencies
        run: uv sync --frozen --all-extras
      - name: Install ruff
        run: uv pip install ruff
      - name: Lint (ruff)
        run: uv run ruff check .
      - name: Format check (ruff)
        run: uv run ruff format --check .
      - name: Test (pytest)
        run: uv run python3 -m pytest tests/ --ignore=tests/test_db.py --ignore=tests/test_migrations.py -q
